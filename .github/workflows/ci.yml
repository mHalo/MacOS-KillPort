# =============================================================================
# KillPort CI Workflow
# =============================================================================
# Runs on every push to main and on pull requests targeting main. Verifies
# that the Swift package compiles in release configuration and executes the
# test suite.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release --disable-sandbox

      - name: Run tests
        run: |
          # Start a test server for port scanning tests
          python3 -m http.server 18923 &
          SERVER_PID=$!
          sleep 1

          # Compile custom test suite (exclude KillPortApp.swift which has @main)
          swiftc Sources/KillPort/Models.swift \
                 Sources/KillPort/PortScanner.swift \
                 Sources/KillPort/ProcessKiller.swift \
                 Tests/KillPortTests/main.swift \
                 -o /tmp/KillPortTests \
                 -framework AppKit -framework SwiftUI \
                 -parse-as-library

          # Run tests
          /tmp/KillPortTests
          TEST_EXIT=$?

          # Cleanup
          kill $SERVER_PID 2>/dev/null || true
          exit $TEST_EXIT
