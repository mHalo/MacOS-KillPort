# =============================================================================
# KillPort Release Workflow
# =============================================================================
# Triggers when a version tag (v* or a bare numeric tag like 1.0.3) is pushed.
# Builds the app on a macOS runner, packages it into a DMG disk image (reusing
# Scripts/build.sh), and publishes a GitHub Release with the artifact attached.
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

# Grant the workflow permission to create releases.
permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & package .app bundle
        run: ./Scripts/build.sh

      - name: Create DMG
        run: |
          cd "$GITHUB_WORKSPACE"
          DMG_NAME="KillPort-${{ github.ref_name }}.dmg"
          # Create a DMG from the .app bundle
          hdiutil create -volname "KillPort" -srcfolder KillPort.app -ov -format UDZO "$DMG_NAME"
          echo "DMG artifact:"
          ls -lh "$DMG_NAME"

      - name: Create GitHub Release & upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: KillPort ${{ github.ref_name }}
          files: KillPort-${{ github.ref_name }}.dmg
          generate_release_notes: true
          body: |
            ## KillPort ${{ github.ref_name }}

            A lightweight macOS menu-bar utility to view and kill processes
            occupying specific ports.

            ### Install
            1. Download `KillPort-${{ github.ref_name }}.dmg` below.
            2. Open the DMG and drag **KillPort.app** into your **Applications** folder.
            3. **Right-click** (or Control-click) the app and choose **Open**
               the first time — macOS Gatekeeper will warn because the app is
               ad-hoc signed. Confirm to launch; subsequent opens are normal.

            ### Known Limitations
            - The app is **ad-hoc signed** (no Apple Developer certificate), so
              the first launch requires a right-click → Open to bypass
              Gatekeeper.
            - Requires **macOS 12.0 (Monterey)** or later.
          draft: false
          prerelease: false
